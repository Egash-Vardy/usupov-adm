<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подача заявки | USUPOV RP</title>
    <style>
        :root {
            --bg-color: #1a1a1a; /* Цвет фона как на форуме */
            --card-bg: #262626; /* Цвет карточек */
            --accent-orange: #ff7f24; /* Фирменный оранжевый USUPOV */
            --text-main: #e0e0e0;
            --input-bg: #1d1d1d;
            --border-color: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }

        .header-style {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--accent-orange);
            padding-bottom: 15px;
        }

        h2 {
            color: var(--accent-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #bbb;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-orange);
            background-color: #222;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-orange);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(255, 127, 36, 0.3);
        }

        .btn-submit:hover {
            filter: brightness(1.2);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 127, 36, 0.5);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--accent-orange);
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-style">
        <h2>Анкета Кандидата</h2>
    </div>
    
    <form action="https://formspree.io/f/xrejlvdk" method="POST">
        <input type="hidden" name="_next" value="https://forum.usupovrp.ru">
        
        <div class="form-group">
            <label>Игровой никнейм (Nick_Name)</label>
            <input type="text" name="nickname" placeholder="Egash_Vardy" required>
        </div>

        <div class="form-group">
            <label>Ваш реальный возраст</label>
            <input type="number" name="age" min="14" placeholder="Набор с 14 лет" required>
        </div>

        <div class="form-group">
            <label>Ссылка на VK (профиль должен быть открыт)</label>
            <input type="url" name="vk_link" placeholder="https://vk.com/id..." required>
        </div>

        <div class="form-group">
            <label>Ваш Discord ID</label>
            <input type="text" name="discord" placeholder="vardy_ultra" required>
        </div>

        <div class="form-group">
            <label>На какую должность подаете?</label>
            <select name="position" required>
                <option value="Администратор">Администратор</option>
                <option value="Восстановление">Восстановление</option>
            </select>
        </div>

        <div class="form-group">
            <label>Опыт на других проектах (подробно)</label>
            <textarea name="experience" rows="3" placeholder="Где стояли, какие уровни админки занимали..."></textarea>
        </div>

        <div class="form-group">
            <label>Ваши цели на посту администрации?</label>
            <textarea name="goals" rows="4" placeholder="Чем планируете заниматься на сервере..."></textarea>
        </div>

        <button type="submit" class="btn-submit">ОТПРАВИТЬ ЗАЯВКУ</button>
    </form>

    <a href="index.html" class="back-link">Вернуться на главную</a>
</div>

</body>
</html>
