<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подача заявки | USUPOV RP</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --accent-orange: #ff7f24;
            --text-main: #e0e0e0;
            --input-bg: #333333;
            --border-color: #444444;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 4px solid var(--accent-orange);
        }

        h2 {
            color: var(--accent-orange);
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-orange);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-orange);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9e9e9e;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: var(--accent-orange);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Анкета кандидата</h2>
    
    <form action="#" method="POST">
        <div class="form-group">
            <label>Ваш игровой ник (Nick_Name)</label>
            <input type="text" placeholder="Например: Egash_Vardy" required>
        </div>

        <div class="form-group">
            <label>Ваш реальный возраст</label>
            <input type="number" min="14" placeholder="Минимум 14 лет" required>
        </div>

        <div class="form-group">
            <label>Ссылка на страницу VK</label>
            <input type="url" placeholder="https://vk.com/..." required>
        </div>

        <div class="form-group">
            <label>Ваш Discord (Ник#0000)</label>
            <input type="text" placeholder="User#1234" required>
        </div>

        <div class="form-group">
            <label>Имелся ли опыт на руководящих должностях?</label>
            <textarea rows="3" placeholder="Распишите подробно..."></textarea>
        </div>

        <div class="form-group">
            <label>Почему именно вы должны занять этот пост?</label>
            <textarea rows="4" placeholder="Ваши сильные стороны..."></textarea>
        </div>

        <button type="submit" class="btn-submit">ОТПРАВИТЬ ЗАЯВКУ</button>
    </form>

    <a href="index.html" class="back-link">← Вернуться к выбору должностей</a>
</div>

</body>
</html>
